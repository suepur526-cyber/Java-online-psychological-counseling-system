spring:
  datasource:
    url: jdbc:h2:mem:counseling_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql
      data-locations: classpath:test-data.sql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.counseling.model
  configuration:
    map-underscore-to-camel-case: true
